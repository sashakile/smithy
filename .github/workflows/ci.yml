name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  WAI_VERSION: v2026.3.2
  DONT_VERSION: 0.1.0
  ESPECTACULAR_VERSION: 0.2.0
  PRETENDER_VERSION: 0.2.0
  TESTARUDA_VERSION: 0.1.0

jobs:
  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install wai
        run: |
          curl -fsSL "https://github.com/charly-vibes/wai/releases/download/${{ env.WAI_VERSION }}/wai_${WAI_VERSION#v}_linux_amd64.tar.gz" | tar -xz -C /usr/local/bin
          chmod +x /usr/local/bin/wai
      - name: Check repo best practices
        run: wai way --json

  spec-consistency:
    name: Spec consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify openspec change proposals have valid status
        run: scripts/check-spec-status.sh
      - name: Check for broken internal links in docs
        run: scripts/check-doc-links.sh docs/*.md README.md

  epistemic-grounding:
    name: Epistemic grounding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dont
        run: cargo install dont --version ${{ env.DONT_VERSION }}
      - name: Check all claims are grounded
        run: dont check

  spec-verification:
    name: Spec verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install espectacular
        run: cargo install espectacular --version ${{ env.ESPECTACULAR_VERSION }}
      - name: Reseed spec-to-test stubs
        run: espectacular init
      - name: Check spec coverage
        run: espectacular check --json
        continue-on-error: true  # spec phase — no tests implemented yet

  code-quality:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pretender
        run: cargo install pretender --version ${{ env.PRETENDER_VERSION }}
      - name: Run pretender check
        run: pretender check --mode tiered .
        continue-on-error: true  # spec phase — no code to check yet

  # TODO: Add language-specific build and test steps when implementation begins
  # - Clojure: deps.edn / lein deps + clojure -M:test
  # - testaruda: testaruda select --from git diff --name-only origin/main
  # - lefthook: lefthook run pre-commit / pre-push

